# .github/workflows/docker-nightly.yml
name: Docker Nightly

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Build even if no changes detected'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: nightly-docker
  cancel-in-progress: true

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      short_sha: ${{ steps.check.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check for recent changes
        id: check
        run: |
          FORCE="${{ github.event.inputs.force || 'false' }}"
          COMMIT_COUNT=$(git log --oneline --since="25 hours ago" | wc -l | tr -d ' ')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          if [[ "$FORCE" == "true" || "$COMMIT_COUNT" -gt 0 ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected ($COMMIT_COUNT commits in last 25h) or force=true"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes in last 25 hours, skipping build"
          fi

  docker:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: backend
            target: ""
          - component: frontend
            target: ""
          - component: worker
            target: worker

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate nightly date tag
        id: date
        run: echo "tag=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ats-${{ matrix.component }}
          tags: |
            type=raw,value=nightly
            type=raw,value=${{ steps.date.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  cleanup:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        component: [backend, frontend, worker]
    steps:
      - name: Prune nightly images older than 30 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-30d +%Y-%m-%dT%H:%M:%SZ)
          PAGE=1
          while true; do
            VERSIONS=$(gh api \
              "/orgs/odense-rpa/packages/container/ats-${{ matrix.component }}/versions?per_page=100&page=$PAGE" \
              --jq '.[]')
            [[ -z "$VERSIONS" ]] && break
            echo "$VERSIONS" | jq -r '. | select(.metadata.container.tags[] | startswith("nightly-")) | select(.updated_at < "'"$CUTOFF"'") | .id' | while read -r VERSION_ID; do
              echo "Deleting version $VERSION_ID"
              gh api --method DELETE "/orgs/odense-rpa/packages/container/ats-${{ matrix.component }}/versions/$VERSION_ID"
            done
            PAGE=$((PAGE + 1))
          done

  prerelease:
    needs: [check-changes, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Generate nightly date tag
        id: date
        run: echo "tag=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Delete previous nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ needs.check-changes.outputs.short_sha }}"
          DATE_TAG="${{ steps.date.outputs.tag }}"
          gh release create nightly \
            --target development \
            --title "Nightly Build ($DATE_TAG)" \
            --prerelease \
            --notes "$(cat <<NOTES
          ## Nightly Build — $(date -u +%Y-%m-%d)

          Built from \`main\` branch at commit \`${SHORT_SHA}\`.

          > **Warning:** Nightly builds are unstable and intended for testing only.

          ### Docker Images

          \`\`\`
          docker pull ghcr.io/odense-rpa/ats-backend:nightly
          docker pull ghcr.io/odense-rpa/ats-frontend:nightly
          docker pull ghcr.io/odense-rpa/ats-worker:nightly
          \`\`\`

          Pinned tag for this build: \`${DATE_TAG}\`
          NOTES
          )"
