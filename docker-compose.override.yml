# Development overrides — automatically applied by `docker compose up`
# For production, use: docker compose -f docker-compose.yml up -d

x-worker-dev: &worker-dev-template
  image: ats-worker-dev
  build:
    context: ./worker
    dockerfile: Dockerfile
    target: worker
#  environment:
#    ATS_CAPABILITIES: playwright
  volumes:
    - playwright-browsers:/playwright

services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ats_password}
      POSTGRES_DB: ${POSTGRES_DB:-ats}
    ports:
      - "5432:5432"

  api:
    image: ats-backend-dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    entrypoint:
      - sh
      - -c
      - >-
        uv run alembic upgrade head &&
        uv run uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --root-path /api
        --proxy-headers
        --forwarded-allow-ips='*'
        --reload
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ats_user}:${POSTGRES_PASSWORD:-ats_password}@db:5432/${POSTGRES_DB:-ats}

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      VITE_ATS_API_BASE_URL: /api


  worker01:
    <<: *worker-dev-template

  worker02:
    <<: *worker-dev-template

  adminer:
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: galkaev
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  frontend_node_modules:
  playwright-browsers:
