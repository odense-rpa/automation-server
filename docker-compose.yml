# Production configuration
# Usage: docker compose -f docker-compose.yml up -d
# For development, use: docker compose up  (auto-applies docker-compose.override.yml)

x-worker-common: &worker-template
  image: ghcr.io/odense-rpa/ats-worker:v0.4.1
  environment:
    ATS_URL: ${ATS_URL:-http://api:8000}
    ATS_TOKEN: ${ATS_TOKEN}
    TZ: ${TZ:-UTC}
    ATS_CAPABILITIES: ${ATS_CAPABILITIES:-}
  networks:
    - app-network
  depends_on:
    api:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=da-DK"
    networks:
      - app-network
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    image: ghcr.io/odense-rpa/ats-backend:v0.4.1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000"
    environment:
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/odense-rpa/ats-frontend:v0.4.1
    ports:
      - "80"
    environment:
      TZ: ${TZ:-UTC}
    networks:
      - app-network
    restart: unless-stopped

  proxy:
    image: nginx:1.30-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - app-network
    restart: unless-stopped

  worker01:
    <<: *worker-template
    hostname: worker-01
    volumes:
      - playwright-browsers:/playwright

  worker02:
    <<: *worker-template
    hostname: worker-02
    volumes:
      - playwright-browsers:/playwright

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  playwright-browsers:
